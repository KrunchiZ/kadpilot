services:
  backend:
    build:
      context: ./backend
    image: backend:1.0
    container_name: kadpilot-backend
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: frontend:1.0
    container_name: kadpilot-frontend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped


networks:
  app-net:
    driver: bridge
